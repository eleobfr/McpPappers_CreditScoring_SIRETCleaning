services:
  credit-ops:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      TZ: Europe/Paris
      DATABASE_PATH: /app/data/credit-ops.sqlite
      PAPPERS_MCP_URL: ${PAPPERS_MCP_URL:-}
      PAPPERS_API_TOKEN: ${PAPPERS_API_TOKEN:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
