name: Deploy production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: |
          npm run typecheck
          npm run lint
          npm run test
          npm run build

      - name: Prepare release archive
        run: |
          mkdir -p dist
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=coverage \
            --exclude=.env.local \
            --exclude=.env \
            --exclude=data \
            --exclude=.next-dev.log \
            --exclude=.next-dev.err.log \
            --exclude=.next-dev-auth.log \
            --exclude=.next-dev-auth.err.log \
            -czf dist/app-release.tar.gz .

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Normalize deployment host
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from urllib.parse import urlparse

          raw = """${{ vars.DEPLOY_HOST }}""".strip()
          if "://" in raw:
            host = urlparse(raw).hostname or raw
          else:
            host = raw.rstrip("/")

          if not host:
            raise SystemExit("DEPLOY_HOST must be configured")

          print(f"DEPLOY_HOST_NORMALIZED={host}")
          PY

      - name: Normalize deployment user
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          raw = """${{ vars.DEPLOY_USER }}""".strip()
          if "@" in raw:
            user = raw.split("@", 1)[0]
          else:
            user = raw

          if not user:
            raise SystemExit("DEPLOY_USER must be configured")

          print(f"DEPLOY_USER_NORMALIZED={user}")
          PY

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST_NORMALIZED" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH access
        run: |
          ssh -v \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER_NORMALIZED@$DEPLOY_HOST_NORMALIZED" \
            "echo SSH_CONNECTION_OK"

      - name: Upload release
        run: |
          scp dist/app-release.tar.gz "$DEPLOY_USER_NORMALIZED@$DEPLOY_HOST_NORMALIZED:/tmp/app-release-${{ github.sha }}.tar.gz"

      - name: Deploy on server
        run: |
          ssh "$DEPLOY_USER_NORMALIZED@$DEPLOY_HOST_NORMALIZED" <<'EOF'
          set -euo pipefail

          SHA="${{ github.sha }}"
          APP_DIR="${{ vars.DEPLOY_APP_DIR }}"
          STACK_DIR="${{ vars.DEPLOY_STACK_DIR }}"
          SERVICE_NAME="${{ vars.DEPLOY_SERVICE }}"
          STAGING_DIR="/tmp/app-release-$SHA"
          ARCHIVE="/tmp/app-release-$SHA.tar.gz"

          if [ -z "$APP_DIR" ] || [ -z "$STACK_DIR" ] || [ -z "$SERVICE_NAME" ]; then
            echo "Deployment variables DEPLOY_APP_DIR, DEPLOY_STACK_DIR and DEPLOY_SERVICE must be configured." >&2
            exit 1
          fi

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          tar -xzf "$ARCHIVE" -C "$STAGING_DIR"
          rm -f "$ARCHIVE"

          find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name data ! -name .env.local -exec rm -rf {} +
          cp -R "$STAGING_DIR"/. "$APP_DIR"/
          rm -rf "$STAGING_DIR"

          cd "$STACK_DIR"
          docker compose up -d --build "$SERVICE_NAME"

          docker image prune -f >/dev/null 2>&1 || true
          EOF
